# fly.toml app configuration file generated for kraken-9tyojw on 2026-05-21T18:04:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kraken-9tyojw'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '45s'
    method = 'GET'
    path = '/health.json'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
