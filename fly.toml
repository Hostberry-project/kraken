# Nombre de la app en Fly (debe coincidir con fly apps list).
app = 'kraken-anqfxw'
primary_region = 'mad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  PUBLIC_URL = 'https://kraken-anqfxw.fly.dev'
  PALANTIR_MORIA_DB = '/data/moria.db'
  PALANTIR_MORIA_ZM3 = '/app/moria_3_3_9.zm3'
  PALANTIR_MORIA_ZM3_URL = 'https://github.com/Hostberry-project/kraken/raw/refs/heads/main/moria_3_3_9.zm3'

[mounts]
  source = 'moria_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = '120s'
    interval = '30s'
    method = 'GET'
    path = '/health.json'
    timeout = '10s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
