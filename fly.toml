# Nombre de la app en Fly (debe coincidir con fly apps list).
app = 'kraken-anqfxw'
primary_region = 'mad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = '45s'
    interval = '30s'
    method = 'GET'
    path = '/health.json'
    timeout = '10s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
